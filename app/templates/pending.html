{% extends "base.html" %}
{% block title %}Ожидание подтверждения{% endblock %}
{% block main_class %}auth-page{% endblock %}
{% block content %}
<div class="auth-card">
  <div class="auth-logo">{{ icon('hourglass', 30, stroke=2) }}</div>
  <h1>Заявка на рассмотрении</h1>
  <p class="auth-sub">Аккаунт ещё не подтверждён администратором. Попробуйте позже.</p>
  <a href="/logout" class="btn btn-secondary btn-block">Выйти</a>
</div>
{% endblock %}

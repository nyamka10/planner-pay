upstream planner_pay_app {
    server web:8000;
}

# --- HTTP: ACME-проверка Let's Encrypt + редирект на HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name planner-pay.it.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: reverse-proxy на приложение ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name planner-pay.it.ru;

    ssl_certificate /etc/letsencrypt/live/planner-pay.it.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/planner-pay.it.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Безопасные заголовки
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    client_max_body_size 8m;

    location / {
        proxy_pass http://planner_pay_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}

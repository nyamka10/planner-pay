services:
  web:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: planner-pay
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Файл SQLite кладётся в каталог /data, примонтированный к ./data рядом
      # с проектом — так база видна как обычный файл на диске.
      DATABASE_URL: "sqlite:////data/planner_pay.db"
    volumes:
      - ./data:/data
    expose:
      - "8000"            # доступен только внутри docker-сети, наружу — через nginx

  nginx:
    image: nginx:1.27-alpine
    container_name: planner-pay-nginx
    restart: unless-stopped
    profiles: ["prod"]   # поднимается только в проде (--profile prod)
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    # Раз в 6 часов перечитываем конфиг — чтобы подхватить продлённый сертификат.
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  certbot:
    image: certbot/certbot
    container_name: planner-pay-certbot
    restart: unless-stopped
    profiles: ["prod"]   # поднимается только в проде (--profile prod)
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Каждые 12 часов пытаемся продлить сертификаты.
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"

# Локально:  docker compose up                       (web :8000, см. docker-compose.override.yml)
# Прод:      docker compose -f docker-compose.yml --profile prod up -d
# SSL:       ./init-letsencrypt.sh   (разовый выпуск сертификата)
# Бэкап базы — файл ./data/planner_pay.db
